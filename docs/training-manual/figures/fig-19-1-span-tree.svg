<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" font-family="Segoe UI, Calibri, sans-serif">
  <defs>
    <marker id="te" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#2D3436"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="940" height="560" fill="#FFFFFF"/>
  <text x="30" y="32" font-size="16" font-weight="bold" fill="#0F4761">Figure 19.1 — The OpenTelemetry GenAI Span Tree</text>
  <text x="30" y="53" font-size="12" fill="#7B8794">A stored run is exported (post-hoc) into a nested span tree: one workflow, one agent span per case, leaf spans per model/tool/score event.</text>

  <!-- ROOT: eval <task> (invoke_workflow) -->
  <rect x="60" y="74" width="540" height="74" rx="6" fill="#FFF3D4" stroke="#D4880F" stroke-width="2"/>
  <text x="78" y="98" font-size="14" font-weight="bold" fill="#0F4761">eval &lt;task&gt;</text>
  <text x="78" y="116" font-size="9.5" font-family="Consolas, monospace" fill="#7B8794">gen_ai.operation.name = invoke_workflow</text>
  <text x="78" y="134" font-size="9.5" font-family="Consolas, monospace" fill="#2D3436">agon.run_id · overall_pass_rate · recommendation · cost.usd</text>
  <text x="588" y="92" font-size="9" fill="#7B8794" text-anchor="end">RUN</text>

  <!-- connector root -> invoke_agent (and down to ghost) -->
  <path d="M 92 148 L 92 215 L 128 215" fill="none" stroke="#2D3436" stroke-width="1.4" marker-end="url(#te)"/>

  <!-- invoke_agent <sample> -->
  <rect x="130" y="182" width="500" height="74" rx="6" fill="#F5F5F0" stroke="#2C3E6B" stroke-width="1.6"/>
  <text x="148" y="206" font-size="13.5" font-weight="bold" fill="#0F4761">invoke_agent &lt;sample&gt;</text>
  <text x="148" y="224" font-size="9.5" font-family="Consolas, monospace" fill="#7B8794">gen_ai.operation.name = invoke_agent · one span per case</text>
  <text x="148" y="242" font-size="9.5" font-family="Consolas, monospace" fill="#2D3436">agon.passed · composite_score · category · risk_level · failure_labels</text>
  <text x="618" y="200" font-size="9" fill="#7B8794" text-anchor="end">CASE</text>

  <!-- connector invoke_agent -> three leaves -->
  <path d="M 162 256 L 162 305 L 198 305" fill="none" stroke="#2D3436" stroke-width="1.4" marker-end="url(#te)"/>
  <path d="M 162 305 L 162 375 L 198 375" fill="none" stroke="#2D3436" stroke-width="1.4" marker-end="url(#te)"/>
  <path d="M 162 375 L 162 445 L 198 445" fill="none" stroke="#2D3436" stroke-width="1.4" marker-end="url(#te)"/>

  <!-- leaf: chat <model> -->
  <rect x="200" y="282" width="430" height="46" rx="6" fill="#FFFFFF" stroke="#2C3E6B" stroke-width="1.4"/>
  <text x="216" y="302" font-size="12.5" font-weight="bold" fill="#0F4761">chat &lt;model&gt;</text>
  <text x="216" y="319" font-size="9.5" font-family="Consolas, monospace" fill="#2D3436">op = chat · gen_ai.provider.name · usage.input/output_tokens</text>

  <!-- leaf: execute_tool <name> (error-capable) -->
  <rect x="200" y="352" width="430" height="46" rx="6" fill="#FFFFFF" stroke="#2C3E6B" stroke-width="1.4"/>
  <text x="216" y="372" font-size="12.5" font-weight="bold" fill="#0F4761">execute_tool &lt;name&gt;</text>
  <text x="216" y="389" font-size="9.5" font-family="Consolas, monospace" fill="#2D3436">op = execute_tool · gen_ai.tool.name · </text>
  <text x="494" y="389" font-size="9.5" font-family="Consolas, monospace" fill="#C0392B">Status=ERROR on tool error</text>

  <!-- leaf: agon.score <scorer> -->
  <rect x="200" y="422" width="430" height="46" rx="6" fill="#E8F5E8" stroke="#5B8C5A" stroke-width="1.4"/>
  <text x="216" y="442" font-size="12.5" font-weight="bold" fill="#0F4761">agon.score &lt;scorer&gt;</text>
  <text x="216" y="459" font-size="9.5" font-family="Consolas, monospace" fill="#2D3436">agon.scorer · agon.score.value (redacted free text)</text>

  <!-- ghost: invoke_agent sample 2 (one per sample) -->
  <path d="M 92 215 L 92 511 L 128 511" fill="none" stroke="#7B8794" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#te)"/>
  <rect x="130" y="492" width="360" height="38" rx="6" fill="#FFFFFF" stroke="#7B8794" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="148" y="515" font-size="11.5" font-style="italic" fill="#7B8794">invoke_agent &lt;sample 2&gt; … one span per case in the run</text>

  <!-- side note -->
  <text x="660" y="300" font-size="10.5" font-weight="bold" fill="#0F4761">Same data as the report —</text>
  <text x="660" y="318" font-size="10.5" fill="#2D3436">now as a queryable,</text>
  <text x="660" y="334" font-size="10.5" fill="#2D3436">chartable timeline.</text>
  <text x="660" y="360" font-size="10" fill="#7B8794">console (offline) ·</text>
  <text x="660" y="376" font-size="10" fill="#7B8794">langsmith · otlp (Tempo)</text>
  <text x="660" y="402" font-size="10" fill="#7B8794">All free-text values pass</text>
  <text x="660" y="418" font-size="10" fill="#7B8794">through secret redaction.</text>
</svg>
