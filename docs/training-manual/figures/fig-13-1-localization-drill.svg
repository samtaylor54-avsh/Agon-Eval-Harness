<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 660" font-family="Segoe UI, Calibri, sans-serif">
  <defs>
    <marker id="d" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#2D3436"/>
    </marker>
    <marker id="dfb" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 Z" fill="#D4880F"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="660" fill="#FFFFFF"/>
  <text x="30" y="32" font-size="16" font-weight="bold" fill="#0F4761">Figure 13.1 — The Failure-Localization Drill</text>
  <text x="30" y="53" font-size="12" fill="#7B8794">Narrow from "a run that isn't a clean PASS" to a single localized cause — then close the loop with a permanent guard.</text>

  <!-- Box 1: trigger (amber gate) -->
  <rect x="100" y="72" width="720" height="64" rx="6" fill="#FFF3D4" stroke="#D4880F" stroke-width="2"/>
  <text x="460" y="98" font-size="14" font-weight="bold" fill="#0F4761" text-anchor="middle">A run that isn't a clean PASS</text>
  <text x="460" y="120" font-size="10.5" fill="#2D3436" text-anchor="middle">exit 1 — something is wrong, but not yet where (e.g. 20 cases, 85% INVESTIGATE)</text>
  <text x="812" y="110" font-size="9" font-family="Consolas, monospace" fill="#7B8794" text-anchor="end">recommendation + exit code</text>

  <line x1="460" y1="136" x2="460" y2="150" stroke="#2D3436" stroke-width="1.6" marker-end="url(#d)"/>

  <!-- Box 2: category -->
  <rect x="160" y="150" width="600" height="60" rx="6" fill="#F5F5F0" stroke="#2C3E6B" stroke-width="1.5"/>
  <text x="460" y="174" font-size="13" font-weight="bold" fill="#0F4761" text-anchor="middle">1 · Narrow by CATEGORY — where did it break?</text>
  <text x="460" y="194" font-size="10.5" fill="#2D3436" text-anchor="middle">the 85% dissolves: structured_output 50%, robustness 67% — the drop is concentrated</text>
  <text x="752" y="184" font-size="9" font-family="Consolas, monospace" fill="#7B8794" text-anchor="end">pass_rate_by_category</text>

  <line x1="460" y1="210" x2="460" y2="226" stroke="#2D3436" stroke-width="1.6" marker-end="url(#d)"/>

  <!-- Box 3: risk -->
  <rect x="210" y="226" width="500" height="60" rx="6" fill="#F5F5F0" stroke="#2C3E6B" stroke-width="1.5"/>
  <text x="460" y="250" font-size="13" font-weight="bold" fill="#0F4761" text-anchor="middle">2 · Weight by RISK — how hard to care?</text>
  <text x="460" y="270" font-size="10.5" fill="#2D3436" text-anchor="middle">triage the high / critical failures first</text>
  <text x="702" y="260" font-size="9" font-family="Consolas, monospace" fill="#7B8794" text-anchor="end">pass_rate_by_risk</text>

  <line x1="460" y1="286" x2="460" y2="302" stroke="#2D3436" stroke-width="1.6" marker-end="url(#d)"/>

  <!-- Box 4: label -->
  <rect x="255" y="302" width="410" height="60" rx="6" fill="#F5F5F0" stroke="#2C3E6B" stroke-width="1.5"/>
  <text x="460" y="326" font-size="13" font-weight="bold" fill="#0F4761" text-anchor="middle">3 · Read the FAILURE LABEL — what kind?</text>
  <text x="460" y="346" font-size="10.5" fill="#2D3436" text-anchor="middle">missing_citation → a hypothesis of cause</text>
  <text x="657" y="336" font-size="9" font-family="Consolas, monospace" fill="#7B8794" text-anchor="end">top_failure_labels</text>

  <line x1="460" y1="362" x2="460" y2="378" stroke="#2D3436" stroke-width="1.6" marker-end="url(#d)"/>

  <!-- Box 5: case + trace -->
  <rect x="300" y="378" width="320" height="60" rx="6" fill="#F5F5F0" stroke="#2C3E6B" stroke-width="1.5"/>
  <text x="460" y="402" font-size="13" font-weight="bold" fill="#0F4761" text-anchor="middle">4 · Open the CASE + TRACE</text>
  <text x="460" y="422" font-size="10.5" fill="#2D3436" text-anchor="middle">one case; confirm the cause for real</text>
  <text x="612" y="412" font-size="9" font-family="Consolas, monospace" fill="#7B8794" text-anchor="end">inspect view</text>

  <line x1="460" y1="438" x2="460" y2="454" stroke="#2D3436" stroke-width="1.6" marker-end="url(#d)"/>

  <!-- Box 6: localized (teal filled, narrowest) -->
  <rect x="345" y="454" width="230" height="54" rx="6" fill="#0F4761" stroke="#0F4761" stroke-width="1.5"/>
  <text x="460" y="479" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5 · CAUSE LOCALIZED</text>
  <text x="460" y="497" font-size="10" fill="#E8F5E8" text-anchor="middle">one case, one label, one cause</text>

  <line x1="460" y1="508" x2="460" y2="532" stroke="#2D3436" stroke-width="1.6" marker-end="url(#d)"/>

  <!-- Box 7: fix + guard (sage) -->
  <rect x="180" y="532" width="560" height="64" rx="6" fill="#E8F5E8" stroke="#5B8C5A" stroke-width="2"/>
  <text x="460" y="558" font-size="13.5" font-weight="bold" fill="#0F4761" text-anchor="middle">Fix the system — then add the case that catches it forever</text>
  <text x="460" y="580" font-size="10.5" fill="#2D3436" text-anchor="middle">failure is data: a permanent regression guard joins the suite (agon compare watches it)</text>

  <!-- Feedback arc: guard rejoins the suite -->
  <path d="M 180 564 C 40 520, 40 150, 100 104" fill="none" stroke="#D4880F" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#dfb)"/>
  <text x="34" y="340" font-size="10.5" font-weight="bold" fill="#D4880F" text-anchor="middle" transform="rotate(-90 34 340)">the suite grows hardest where the system has actually failed</text>
</svg>
