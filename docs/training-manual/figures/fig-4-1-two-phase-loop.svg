<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" font-family="Segoe UI, Calibri, sans-serif">
  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#2D3436"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="470" fill="#FFFFFF"/>
  <text x="30" y="32" font-size="16" font-weight="bold" fill="#0F4761">Figure 4.1 — The Two-Phase Practitioner Workflow</text>
  <text x="30" y="53" font-size="12" fill="#7B8794">The same harness, run against the same cases, asks a different question before and after you ship.</text>

  <!-- PHASE 1 banner -->
  <rect x="30" y="70" width="900" height="22" rx="4" fill="#FFF3D4" stroke="#D4880F" stroke-width="1"/>
  <text x="42" y="85" font-size="11.5" font-weight="bold" fill="#D4880F">PHASE 1 — DEVELOPMENT · harness as adversary · asks: "Is it good enough to ship?"</text>

  <!-- Phase 1 boxes -->
  <!-- Design -->
  <rect x="60" y="108" width="200" height="92" rx="6" fill="#F5F5F0" stroke="#2C3E6B" stroke-width="1.5"/>
  <text x="160" y="150" font-size="15" font-weight="bold" fill="#0F4761" text-anchor="middle">Design</text>
  <text x="160" y="172" font-size="10.5" fill="#2D3436" text-anchor="middle">write cases for the failure</text>
  <text x="160" y="187" font-size="10.5" fill="#2D3436" text-anchor="middle">modes that matter</text>

  <!-- Evaluate (harness) -->
  <rect x="380" y="108" width="200" height="92" rx="6" fill="#FFFFFF" stroke="#0F4761" stroke-width="2.5"/>
  <rect x="380" y="108" width="74" height="18" rx="3" fill="#0F4761"/>
  <text x="417" y="121" font-size="9.5" font-weight="bold" fill="#FFFFFF" text-anchor="middle">▶ HARNESS</text>
  <text x="480" y="155" font-size="15" font-weight="bold" fill="#0F4761" text-anchor="middle">Evaluate</text>
  <text x="480" y="177" font-size="10.5" fill="#2D3436" text-anchor="middle">score · gate · localize</text>
  <text x="480" y="192" font-size="10.5" font-style="italic" fill="#7B8794" text-anchor="middle">find failures before users do</text>

  <!-- Deploy gate -->
  <rect x="700" y="108" width="200" height="92" rx="6" fill="#FFF3D4" stroke="#D4880F" stroke-width="2"/>
  <text x="800" y="150" font-size="15" font-weight="bold" fill="#0F4761" text-anchor="middle">Deploy — the gate</text>
  <text x="800" y="172" font-size="10.5" fill="#2D3436" text-anchor="middle">exit 0 ships · exit 1 stops</text>
  <text x="800" y="187" font-size="10.5" fill="#2D3436" text-anchor="middle">the release decision</text>

  <!-- Phase 1 arrows -->
  <line x1="260" y1="154" x2="378" y2="154" stroke="#2D3436" stroke-width="1.6" marker-end="url(#a2)"/>
  <line x1="580" y1="154" x2="698" y2="154" stroke="#2D3436" stroke-width="1.6" marker-end="url(#a2)"/>

  <!-- Transition down: Deploy -> Observe -->
  <line x1="800" y1="200" x2="800" y2="298" stroke="#2D3436" stroke-width="1.6" marker-end="url(#a2)"/>
  <text x="812" y="252" font-size="10.5" font-weight="bold" fill="#2D3436">ship ↓</text>

  <!-- PHASE 2 banner -->
  <rect x="30" y="268" width="900" height="22" rx="4" fill="#E8F5E8" stroke="#5B8C5A" stroke-width="1"/>
  <text x="42" y="283" font-size="11.5" font-weight="bold" fill="#5B8C5A">PHASE 2 — PRODUCTION · harness as regression gate · asks: "Is it still as good as when we shipped?"</text>

  <!-- Phase 2 boxes (right to left) -->
  <!-- Observe (harness) -->
  <rect x="700" y="306" width="200" height="92" rx="6" fill="#FFFFFF" stroke="#0F4761" stroke-width="2.5"/>
  <rect x="700" y="306" width="74" height="18" rx="3" fill="#0F4761"/>
  <text x="737" y="319" font-size="9.5" font-weight="bold" fill="#FFFFFF" text-anchor="middle">▶ HARNESS</text>
  <text x="800" y="353" font-size="15" font-weight="bold" fill="#0F4761" text-anchor="middle">Observe</text>
  <text x="800" y="375" font-size="10.5" fill="#2D3436" text-anchor="middle">re-run cases · trace prod</text>
  <text x="800" y="390" font-size="10.5" font-style="italic" fill="#7B8794" text-anchor="middle">catch silent regression</text>

  <!-- Learn -->
  <rect x="380" y="306" width="200" height="92" rx="6" fill="#F5F5F0" stroke="#2C3E6B" stroke-width="1.5"/>
  <text x="480" y="348" font-size="15" font-weight="bold" fill="#0F4761" text-anchor="middle">Learn</text>
  <text x="480" y="370" font-size="10.5" fill="#2D3436" text-anchor="middle">localize: category ▸ case</text>
  <text x="480" y="385" font-size="10.5" fill="#2D3436" text-anchor="middle">▸ label ▸ trace ▸ cause</text>

  <!-- Improve -->
  <rect x="60" y="306" width="200" height="92" rx="6" fill="#E8F5E8" stroke="#5B8C5A" stroke-width="1.5"/>
  <text x="160" y="348" font-size="15" font-weight="bold" fill="#0F4761" text-anchor="middle">Improve</text>
  <text x="160" y="370" font-size="10.5" fill="#2D3436" text-anchor="middle">fix · then add the case</text>
  <text x="160" y="385" font-size="10.5" fill="#2D3436" text-anchor="middle">that catches it forever</text>

  <!-- Phase 2 arrows (leftward) -->
  <line x1="700" y1="352" x2="582" y2="352" stroke="#2D3436" stroke-width="1.6" marker-end="url(#a2)"/>
  <line x1="380" y1="352" x2="262" y2="352" stroke="#2D3436" stroke-width="1.6" marker-end="url(#a2)"/>

  <!-- Loop back up: Improve -> Design -->
  <line x1="160" y1="306" x2="160" y2="202" stroke="#2D3436" stroke-width="1.6" marker-end="url(#a2)"/>
  <text x="172" y="252" font-size="10.5" font-weight="bold" fill="#2D3436">↑ next iteration</text>

  <!-- Center linking note -->
  <text x="480" y="240" font-size="11" font-style="italic" fill="#7B8794" text-anchor="middle">Same harness · same cases · two different questions</text>
  <text x="480" y="430" font-size="11.5" font-weight="bold" fill="#0F4761" text-anchor="middle">A loop, not a line — the suite the harness runs grows with every failure it finds.</text>
</svg>
